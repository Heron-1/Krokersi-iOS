workflows:
  ios-build:
    name: Krokersi iOS Build
    instance_type: mac_mini_m1
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalacja NPM
        script: npm install
      - name: Instalacja globalnego Capacitora
        script: npm install -g @capacitor/cli
      - name: Synchronizacja platformy
        script: cap sync ios
      - name: Instalacja CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Budowa Xcode (Unsigned)
        script: |
          cd ios/App
          xcodebuild build -workspace App.xcworkspace -scheme App -destination "generic/platform=iOS" CODE_SIGNING_ALLOWED=NO
