workflows:
  ios-build:
    name: Krokersi iOS Build
    instance_type: mac_mini_m1
    environment:
      node: 22
      cocoapods: default
    scripts:
      - name: 1. Przygotowanie srodowiska
        script: |
          npm install
          # Wymuszamy stworzenie folderu ios w chmurze
          npx cap add ios || true
          npx cap sync ios
      - name: 2. Instalacja CocoaPods
        script: |
          cd ios/App
          pod install --repo-update
      - name: 3. Budowa aplikacji (Unsigned)
        script: |
          cd ios/App
          xcodebuild build -workspace App.xcworkspace -scheme App -destination "generic/platform=iOS" CODE_SIGNING_ALLOWED=NO
