workflows:
  ios-build:
    name: Krokersi iOS Build
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: pl.krokersi.app
    scripts:
      - name: Instalacja i Build
        script: |
          npm install
          mkdir -p www
          echo "<!DOCTYPE html><html><head><title>Krokersi</title></head><body></body></html>" > www/index.html
          rm -rf ios
          chmod -R +x node_modules/.bin/ || true
          npx cap add ios
          npx cap sync ios
          cd ios/App
          xcode-project use-profiles
          xcode-project build-ipa --workspace "App.xcworkspace" --scheme "App"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
