workflows:
  ios-build:
    name: Krokersi iOS Build
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 22
    scripts:
      - name: Generowanie certyfikatów Apple
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "pl.krokersi.app" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Instalacja i Build
        script: |
          npm install
          mkdir -p www
          echo "<!DOCTYPE html><html><head><title>Krokersi</title></head><body></body></html>" > www/index.html
          rm -rf ios
          chmod -R +x node_modules/.bin/ || true
          npx cap add ios
          npx cap sync ios
          cd ios/App
          xcode-project use-profiles
          xcode-project build-ipa --project "App.xcodeproj" --scheme "App"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
