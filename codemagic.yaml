workflows:
  ios-build:
    name: Krokersi iOS Build
    instance_type: mac_mini_m1
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Full Build Process
        script: |
          set -ex
          npm install
          chmod +x node_modules/.bin/cap
          npx cap add ios || true
          npx cap sync ios
          cd ios/App
          pod install --repo-update
          xcodebuild build -workspace App.xcworkspace -scheme App -destination "generic/platform=iOS" CODE_SIGNING_ALLOWED=NO
