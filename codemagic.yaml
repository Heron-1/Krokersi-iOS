workflows:
  ios-build:
    name: Krokersi iOS Build
    instance_type: mac_mini_m1
    environment:
      node: 22
    scripts:
      - name: 1. Przygotowanie struktury web
        script: |
          npm install
          npm run build || true
          mkdir -p www dist build public
          rm -rf ios
      - name: 2. Czysta generacja platformy iOS
        script: |
          npm install -g @capacitor/cli
          cap add ios
          cap sync ios
      - name: 3. Instalacja CocoaPods i Build
        script: |
          cd ios/App
          pod install
          xcodebuild build -workspace App.xcworkspace -scheme App -destination "generic/platform=iOS" CODE_SIGNING_ALLOWED=NO
