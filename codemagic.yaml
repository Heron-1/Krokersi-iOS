workflows:
  ios-build:
    name: Krokersi iOS Build
    instance_type: mac_mini_m1
    environment:
      node: 22
    scripts:
      - name: Instalacja i Build
        script: |
          npm install
          # Tworzenie sztucznego srodowiska web, aby Capacitor ruszyl dalej
          mkdir -p www
          echo "<!DOCTYPE html><html><head><title>Krokersi</title></head><body></body></html>" > www/index.html
          rm -rf ios
          chmod -R +x node_modules/.bin/ || true
          npx cap add ios
          npx cap sync ios
          cd ios/App
          pod install
          xcodebuild build -workspace App.xcworkspace -scheme App -destination "generic/platform=iOS" CODE_SIGNING_ALLOWED=NO
