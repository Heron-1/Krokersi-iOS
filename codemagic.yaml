workflows:
  ios-build:
    name: Krokersi iOS Build
    instance_type: mac_mini_m1
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: 1. Instalacja NPM
        script: npm install
      - name: 2. Capacitor Sync
        script: |
          npm run build || true
          chmod +x node_modules/.bin/cap
          npx cap add ios || true
          npx cap sync ios
      - name: 3. Xcode Build
        script: |
          cd ios/App
          pod install || true
          xcodebuild build -workspace App.xcworkspace -scheme App -destination "generic/platform=iOS" CODE_SIGNING_ALLOWED=NO
