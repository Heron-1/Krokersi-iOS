workflows:
  ios-build:
    name: Krokersi iOS Build
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: pl.krokersi.app
    scripts:
      - name: Instalacja i Build
        script: |
          npm install
          npm install cordova-plugin-pedometer
          npm install @capacitor-community/admob
          npm install @capacitor/assets --no-save
          mkdir -p www
          echo "<!DOCTYPE html><html><head><title>Krokersi</title></head><body></body></html>" > www/index.html
          rm -rf ios
          chmod -R +x node_modules/.bin/ || true
          npx cap add ios
          
          if [ -f "assets/icon.jpg" ]; then
            cp assets/icon.jpg assets/icon.png
          fi
          
          npx capacitor-assets generate --ios
          npx cap sync ios
          cd ios/App
          
          /usr/libexec/PlistBuddy -c "Add :NSMotionUsageDescription string 'Aplikacja Krokersi używa czujników do zliczania kroków.'" App/Info.plist || /usr/libexec/PlistBuddy -c "Set :NSMotionUsageDescription 'Aplikacja Krokersi używa czujników do zliczania kroków.'" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Aplikacja Krokersi używa GPS do zapisu trasy na mapie.'" App/Info.plist || /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'Aplikacja Krokersi używa GPS do zapisu trasy na mapie.'" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string 'ca-app-pub-6681851361306996~6816324430'" App/Info.plist || /usr/libexec/PlistBuddy -c "Set :GADApplicationIdentifier 'ca-app-pub-6681851361306996~6816324430'" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSUserTrackingUsageDescription string 'Zgoda na reklamy pozwala utrzymać darmową wersję Krokersów.'" App/Info.plist || /usr/libexec/PlistBuddy -c "Set :NSUserTrackingUsageDescription 'Zgoda na reklamy pozwala utrzymać darmową wersję Krokersów.'" App/Info.plist
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" App/Info.plist
          
          xcode-project use-profiles
          xcode-project build-ipa --project "App.xcodeproj" --scheme "App"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
